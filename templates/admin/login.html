{% extends "base.html" %}

{% block content %}

<h1>Connexion administrateur</h1>

{% if erreur %}
<p style="color:red;">{{ erreur }}</p>
{% endif %}

<form method="POST">

    <p>Email</p>
    <input type="email" name="email" required> <br><br>

    <p>Mot de passe</p>
    <input type="password" name="motdepasse" required> <br><br>

    <button type="submit"> Se connecter </button>

</form>

{% endblock %}
